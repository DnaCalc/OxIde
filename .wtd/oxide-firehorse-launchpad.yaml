version: 1
name: oxide-firehorse-launchpad
defaults:
  terminalSize:
    cols: 120
    rows: 34
profiles:
  oxide-firehorse-launchpad:
    type: custom
    executable: 'C:\Work\DnaCalc\OxIde\target\release\oxide-uxlab.exe'
    cwd: 'C:\Work\DnaCalc\OxIde'
    args:
      - '--suite'
      - 'firehorse'
      - '--scenario'
      - 'firehorse-launchpad-standard'
      - '--viewport'
      - 'standard'
      - '--once'
tabs:
  - name: launchpad
    layout:
      type: pane
      name: oxide-firehorse-launchpad-pane
      session:
        profile: oxide-firehorse-launchpad

version: 1
name: oxide-smoke
defaults:
  terminalSize:
    cols: 120
    rows: 40
profiles:
  oxide-empty:
    type: custom
    executable: 'C:\Work\DnaCalc\OxIde\target\release\ox-ide.exe'
    cwd: 'C:\Work\DnaCalc\OxIde'
  oxide-thin-slice:
    type: custom
    executable: 'C:\Work\DnaCalc\OxIde\target\release\ox-ide.exe'
    cwd: 'C:\Work\DnaCalc\OxIde'
    args:
      - 'examples/thin-slice/ThinSliceHello.basproj'
tabs:
  - name: empty
    layout:
      type: pane
      name: oxide-empty-pane
      session:
        profile: oxide-empty
  - name: thin-slice
    layout:
      type: pane
      name: oxide-thin-pane
      session:
        profile: oxide-thin-slice

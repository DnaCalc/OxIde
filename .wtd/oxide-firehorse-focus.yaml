version: 1
name: oxide-firehorse-focus
defaults:
  terminalSize:
    cols: 92
    rows: 30
profiles:
  oxide-firehorse-focus:
    type: custom
    executable: 'C:\Work\DnaCalc\OxIde\target\release\oxide-uxlab.exe'
    cwd: 'C:\Work\DnaCalc\OxIde'
    args:
      - '--suite'
      - 'firehorse'
      - '--scenario'
      - 'firehorse-focus-compact'
      - '--viewport'
      - 'compact'
      - '--once'
tabs:
  - name: compact-focus
    layout:
      type: pane
      name: oxide-firehorse-focus-pane
      session:
        profile: oxide-firehorse-focus
